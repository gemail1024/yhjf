# pr-agent 仓库级配置：开发规范检查（演示版，Python/Flask）
[pr_reviewer]
extra_instructions = """
请用中文输出。重点检查是否违反以下团队开发规范，违反处在「关键问题」中明确指出：
1. 函数职责单一，过长函数（>50 行）需拆分
2. 卫语句提前返回，减少嵌套，if 嵌套不超过两层
3. 异常须捕获具体类型并记录日志，禁止裸 except:
4. 禁止硬编码密钥/密码/魔法值，应走配置或常量
5. 数据库/外部调用避免循环内逐条查询（N+1），改批量
6. 命名清晰，遵循 PEP8
所有标题、小标题、分类标签（category/label）以及安全问题名称请一律使用简体中文，不要输出英文。
"""

[pr_code_suggestions]
extra_instructions = """
请用中文。对照上述规范，给出符合规范的具体修改代码建议。
所有标题、小标题、分类标签（category/label）请一律使用简体中文，不要输出英文。
"""
